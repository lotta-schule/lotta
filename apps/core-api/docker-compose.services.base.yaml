---
services:
  postgres:
    image: postgres:15.1
    command: -c 'max_connections=500'
    environment:
      POSTGRES_USER: lotta
      POSTGRES_PASSWORD: lotta
      POSTGRES_DB: lotta
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lotta']
      interval: 20s
      timeout: 10s
      retries: 7

  redis:
    image: bitnamilegacy/redis:latest
    environment:
      - REDIS_PASSWORD=lotta
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 20s
      timeout: 10s
      retries: 7

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - '9100:9100'
      - '9101:9101'
    command:
      [
        'server',
        '--address',
        '0.0.0.0:9100',
        '--console-address',
        '0.0.0.0:9101',
        '/data',
      ]
    environment:
      MINIO_SERVER_URL: http://0.0.0.0:9100
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
      MINIO_DEFAULT_BUCKETS: 'lotta-e2e:s3:*'
    user: root
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://0.0.0.0:9100/minio/health/live || exit 1',
        ]
      interval: 20s
      timeout: 5s
      retries: 7

  minio-setup:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    restart: no
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set dockerminio http://minio:9100 minio miniosecret;
      /usr/bin/mc mb dockerminio/lotta-dev;
      /usr/bin/mc anonymous set download dockerminio/lotta-dev;

      /usr/bin/mc alias set dockerminio http://minio:9100 minio miniosecret;
      /usr/bin/mc mb dockerminio/lotta-test;
      /usr/bin/mc anonymous set download dockerminio/lotta-test;

      /usr/bin/mc alias set dockerminio http://minio:9100 minio miniosecret;
      /usr/bin/mc mb dockerminio/lotta-e2e;
      /usr/bin/mc anonymous set download dockerminio/lotta-e2e;
      exit 0;
      "
