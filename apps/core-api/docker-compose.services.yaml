---
services:
  postgres:
    extends:
      file: './docker-compose.services.base.yaml'
      service: postgres
    volumes:
      - ./_data/postgres:/var/lib/postgresql/data
    restart: always
    ports:
      - '5432:5432'
      - '5433:5433'
    depends_on:
      minio-setup:
        condition: service_completed_successfully

  redis:
    extends:
      file: './docker-compose.services.base.yaml'
      service: redis
    ports:
      - '6379:6379'

  minio:
    extends:
      file: './docker-compose.services.base.yaml'
      service: minio
    volumes:
      - ./_data/minio:/data
    ports:
      - 9100:9100
      - 9101:9101

  minio-setup:
    extends:
      file: './docker-compose.services.base.yaml'
      service: minio-setup

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DISABLE_POSTFIX: 'true'
      PGADMIN_DEFAULT_EMAIL: lotta@lotta.schule
      PGADMIN_DEFAULT_PASSWORD: lotta
      PGADMIN_SERVER_JSON_FILE: /tmp/server.json
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    restart: always
    ports:
      - 8888:80
    volumes:
      - /var/lib/pgadmin
      - ./:/files
      - ./pgadmin.json:/tmp/server.json:ro

  tempo:
    image: grafana/tempo:latest
    command: ['-config.file=/etc/tempo.yaml']
    ports:
      - '3200:3200'
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./_data/tempo:/tmp/tempo
      - ./tempo.yaml:/etc/tempo.yaml:ro

  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    volumes:
      - ./_data/prometheus:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      [
        '--config.file=/etc/prometheus/prometheus.yml',
        '--storage.tsdb.path=/prometheus',
      ]
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  loki:
    image: grafana/loki:latest
    command: ['-config.file=/etc/loki/config.yaml']
    ports:
      - '3100:3100'
    volumes:
      - ./_data/loki:/tmp/loki
      - ./loki.yaml:/etc/loki/config.yaml:ro

  alloy:
    image: grafana/alloy:latest
    command:
      [
        'run',
        '--server.http.listen-addr=0.0.0.0:12345',
        '--storage.path=/var/lib/alloy',
        '/etc/alloy/config.alloy',
      ]
    ports:
      - '12345:12345'
    volumes:
      - ./alloy.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      tempo:
        condition: service_started
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./_data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - '3080:3000'
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
      loki:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q --spider http://localhost:3000/api/health || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
